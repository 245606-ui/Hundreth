<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>The Hundredth Depth - v1.5</title>
<style>
body{
margin:0;
background:#06060a;
color:#ccc;
font-family:monospace;
overflow:hidden;
}
canvas{
display:block;
margin:0 auto;
background:#000;
}
.screen{
position:absolute;
width:100%;
height:100%;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
background:radial-gradient(circle,#111,#000 80%);
z-index:10;
}
.screen button{
margin:6px;
padding:8px 16px;
background:#111;
color:#ccc;
border:1px solid #444;
}
#battleUI{
position:absolute;
bottom:0;
left:0;
width:100%;
background:#111;
border-top:2px solid #333;
padding:10px;
display:none;
}
#battleUI button{
margin:4px;
padding:6px 12px;
background:#222;
color:#ddd;
border:1px solid #444;
}
</style>
</head>
<body>

<div id="menu" class="screen">
<h1>The Hundredth Depth</h1>
<button onclick="newGame()">New Game</button>
<button onclick="loadGame()">Load Game</button>
</div>

<div id="levelUpScreen" class="screen" style="display:none;"></div>

<div id="skillTreeWindow" class="screen" style="display:none;">
<canvas id="skillTreeCanvas" width="1000" height="600"></canvas>
<button onclick="closeSkillTree()">Back</button>
</div>

<canvas id="game"></canvas>
<div id="battleUI"></div>

<script>

/* ================= CONFIG ================= */

const TILE=32,W=40,H=28;
const canvas=document.getElementById("game");
canvas.width=W*TILE;
canvas.height=H*TILE;
const ctx=canvas.getContext("2d");

/* ================= STATE ================= */

let state="menu";
let floor=1;
let map=[],player,enemies=[];
let currentEnemy=null;
let defending=false;
let stairs=null;

/* ================= PLAYER ================= */

function basePlayer(){
return{
x:5,y:5,
hp:120,maxHp:120,
mp:40,maxMp:40,
atk:12,def:6,
xp:0,
level:1,
skillPoints:0,
inventory:[],
abilities:{
physical:[{id:"slash",name:"Slash",power:12}],
spells:[{id:"fireball",name:"Fireball",power:22,mp:6}]
},
unlockedSkills:["slash","fireball"]
};
}

/* ================= MENU ================= */

function newGame(){
player=basePlayer();
floor=1;
document.getElementById("menu").style.display="none";
state="explore";
generateFloor();
}

function loadGame(){
let data=localStorage.getItem("depthSave");
if(!data)return;
let parsed=JSON.parse(data);
player=parsed.player;
floor=parsed.floor;
document.getElementById("menu").style.display="none";
state="explore";
generateFloor();
}

function saveGame(){
localStorage.setItem("depthSave",JSON.stringify({player,floor}));
}

/* ================= FLOOR GENERATION ================= */

function generateFloor(){

map=[];
for(let y=0;y<H;y++){
let row=[];
for(let x=0;x<W;x++) row.push(1);
map.push(row);
}

enemies=[];
stairs=null;

let rooms=[];
let roomCount=rand(8,14);

for(let i=0;i<roomCount;i++){

let rw=rand(5,10);
let rh=rand(5,8);
let rx=rand(2,W-rw-2);
let ry=rand(2,H-rh-2);

let newRoom={x:rx,y:ry,w:rw,h:rh};
let failed=false;

for(let other of rooms){
if(rx < other.x+other.w+1 &&
rx+rw+1 > other.x &&
ry < other.y+other.h+1 &&
ry+rh+1 > other.y){
failed=true;
break;
}
}

if(!failed){
rooms.push(newRoom);

for(let y=ry;y<ry+rh;y++){
for(let x=rx;x<rx+rw;x++){
map[y][x]=0;
}
}

if(rooms.length>1){
connectRooms(rooms[rooms.length-2],newRoom);
}
}
}

let firstRoom=rooms[0];
player.x=Math.floor(firstRoom.x+firstRoom.w/2);
player.y=Math.floor(firstRoom.y+firstRoom.h/2);

let lastRoom=rooms[rooms.length-1];
stairs={
x:Math.floor(lastRoom.x+lastRoom.w/2),
y:Math.floor(lastRoom.y+lastRoom.h/2)
};

if(floor==100){
enemies.push({
x:stairs.x,
y:stairs.y-1,
hp:1000,
maxHp:1000,
atk:30,
def:18,
name:"The Abyssal One",
boss:true,
xp:800
});
}else{
for(let r of rooms){
for(let i=0;i<2;i++){
let ex=rand(r.x+1,r.x+r.w-2);
let ey=rand(r.y+1,r.y+r.h-2);
if(!(ex==player.x && ey==player.y)){
enemies.push({
x:ex,
y:ey,
hp:60+floor*8,
maxHp:60+floor*8,
atk:12+Math.floor(floor/6),
def:6,
name:"Dungeon Fiend",
xp:50+floor*6
});
}
}
}
}

draw();
saveGame();
}

function connectRooms(a,b){

let ax=Math.floor(a.x+a.w/2);
let ay=Math.floor(a.y+a.h/2);
let bx=Math.floor(b.x+b.w/2);
let by=Math.floor(b.y+b.h/2);

if(Math.random()<0.5){
carveHorizontal(ax,bx,ay);
carveVertical(ay,by,bx);
}else{
carveVertical(ay,by,ax);
carveHorizontal(ax,bx,by);
}
}

function carveHorizontal(x1,x2,y){
for(let x=Math.min(x1,x2);x<=Math.max(x1,x2);x++)
map[y][x]=0;
}

function carveVertical(y1,y2,x){
for(let y=Math.min(y1,y2);y<=Math.max(y1,y2);y++)
map[y][x]=0;
}

/* ================= MOVEMENT ================= */

function move(dx,dy){
if(state!="explore")return;

let nx=player.x+dx;
let ny=player.y+dy;

if(map[ny][nx]==1)return;

let enemy=enemies.find(e=>e.x==nx&&e.y==ny);
if(enemy){ startBattle(enemy); return; }

player.x=nx;
player.y=ny;

if(stairs && player.x==stairs.x && player.y==stairs.y){
if(floor<100){
floor++;
generateFloor();
return;
}
}

draw();
}

/* ================= BATTLE ================= */

function startBattle(enemy){
state="battle";
currentEnemy=enemy;
document.getElementById("battleUI").style.display="block";
renderBattleMenu();
drawBattleScene();
}

function drawBattleScene(){
ctx.fillStyle="black";
ctx.fillRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="white";
ctx.fillText("Level "+player.level+" Hero",100,80);

drawBar(100,100,player.hp,player.maxHp,"red");
drawBar(100,130,player.mp,player.maxMp,"blue");

ctx.fillText(currentEnemy.name,canvas.width-300,80);
drawBar(canvas.width-300,100,currentEnemy.hp,currentEnemy.maxHp,"purple");
}

function drawBar(x,y,val,max,color){
ctx.fillStyle="#222";
ctx.fillRect(x,y,200,16);
ctx.fillStyle=color;
ctx.fillRect(x,y,(val/max)*200,16);
}

function renderBattleMenu(){
let ui=document.getElementById("battleUI");
ui.innerHTML="";
addButton("Attack",openPhysicalMenu);
addButton("Spells",openSpellMenu);
addButton("Rest",rest);
addButton("Defend",defend);
addButton("Flee",flee);
}

function openPhysicalMenu(){
let ui=document.getElementById("battleUI");
ui.innerHTML="";
player.abilities.physical.forEach(a=>{
addButton(a.name,()=>useAttack(a));
});
addButton("Back",renderBattleMenu);
}

function openSpellMenu(){
let ui=document.getElementById("battleUI");
ui.innerHTML="";
player.abilities.spells.forEach(s=>{
addButton(s.name+" ("+s.mp+" MP)",()=>useSpell(s));
});
addButton("Back",renderBattleMenu);
}

function addButton(text,func){
let b=document.createElement("button");
b.innerText=text;
b.onclick=func;
document.getElementById("battleUI").appendChild(b);
}

function useAttack(a){
let dmg=Math.max(1,(player.atk+a.power)-currentEnemy.def);
currentEnemy.hp-=dmg;
enemyTurn();
}

function useSpell(s){
if(player.mp<s.mp)return;
player.mp-=s.mp;
let dmg=s.power+Math.floor(player.level*2);
currentEnemy.hp-=dmg;
enemyTurn();
}

function rest(){
player.hp=Math.min(player.maxHp,player.hp+15);
enemyTurn();
}

function defend(){
defending=true;
enemyTurn();
}

function flee(){
if(Math.random()<0.5) endBattle();
else enemyTurn();
}

function enemyTurn(){

if(currentEnemy.hp<=0){
gainXP(currentEnemy.xp);

if(Math.random()<0.15){
player.inventory.push("Ancient Tome");
alert("You found an Ancient Tome!");
}

if(currentEnemy.boss){
alert("You defeated The Abyss!");
location.reload();
return;
}

endBattle();
return;
}

let dmg=Math.max(1,currentEnemy.atk-player.def);
if(defending)dmg=Math.floor(dmg/2);
player.hp-=dmg;
defending=false;

if(player.hp<=0){
alert("You have fallen...");
location.reload();
return;
}

drawBattleScene();
}

function endBattle(){
enemies=enemies.filter(e=>e!=currentEnemy);
currentEnemy=null;
state="explore";
document.getElementById("battleUI").style.display="none";
draw();
}

/* ================= XP + LEVEL ================= */

function gainXP(amount){
player.xp+=amount;
if(player.xp>=player.level*100){
player.xp=0;
player.level++;
player.skillPoints+=3;
openLevelUp();
}
}

function openLevelUp(){
state="levelup";
let s=document.getElementById("levelUpScreen");
s.style.display="flex";
s.innerHTML="<h2>Level Up!</h2>";
s.innerHTML+="<p>Skill Points: "+player.skillPoints+"</p>";
s.innerHTML+="<button onclick='addStat(\"atk\")'>+ Attack</button>";
s.innerHTML+="<button onclick='addStat(\"def\")'>+ Defense</button>";
s.innerHTML+="<button onclick='addStat(\"hp\")'>+ Max HP</button>";
s.innerHTML+="<button onclick='addStat(\"mp\")'>+ Max MP</button>";
s.innerHTML+="<button onclick='openSkillTree()'>Open Skill Tree</button>";
s.innerHTML+="<button onclick='closeLevelUp()'>Continue</button>";
}

function addStat(stat){
if(player.skillPoints<=0)return;
player.skillPoints--;
if(stat=="atk")player.atk+=2;
if(stat=="def")player.def+=2;
if(stat=="hp"){player.maxHp+=20;player.hp=player.maxHp;}
if(stat=="mp"){player.maxMp+=10;player.mp=player.maxMp;}
openLevelUp();
}

function closeLevelUp(){
document.getElementById("levelUpScreen").style.display="none";
state="explore";
draw();
}

/* ================= SKILL TREE ================= */

let skillTree={
nodes:[
{
id:"powerStrike",
name:"Power Strike",
x:300,y:150,
type:"physical",
power:25,
cost:1,
requiresLevel:2,
requiresItem:null,
requires:["slash"]
},
{
id:"whirlwind",
name:"Whirlwind",
x:300,y:250,
type:"physical",
power:40,
cost:2,
requiresLevel:4,
requiresItem:null,
requires:["powerStrike"]
},
{
id:"iceSpear",
name:"Ice Spear",
x:700,y:150,
type:"spell",
power:35,
mp:10,
cost:1,
requiresLevel:3,
requiresItem:null,
requires:["fireball"]
},
{
id:"lightning",
name:"Lightning Bolt",
x:700,y:250,
type:"spell",
power:60,
mp:18,
cost:2,
requiresLevel:6,
requiresItem:"Ancient Tome",
requires:["iceSpear"]
}
]
};

function openSkillTree(){
document.getElementById("skillTreeWindow").style.display="flex";
drawSkillTree();
}

function closeSkillTree(){
document.getElementById("skillTreeWindow").style.display="none";
}

function drawSkillTree(){
let c=document.getElementById("skillTreeCanvas");
let ctx2=c.getContext("2d");
ctx2.clearRect(0,0,c.width,c.height);
ctx2.fillStyle="#000";
ctx2.fillRect(0,0,c.width,c.height);

ctx2.strokeStyle="#555";
ctx2.lineWidth=2;

skillTree.nodes.forEach(n=>{
n.requires.forEach(r=>{
let parent=skillTree.nodes.find(p=>p.id==r);
if(parent){
ctx2.beginPath();
ctx2.moveTo(parent.x,parent.y);
ctx2.lineTo(n.x,n.y);
ctx2.stroke();
}
});
});

skillTree.nodes.forEach(n=>{
let unlocked=player.unlockedSkills.includes(n.id);
let available=canUnlock(n);

ctx2.beginPath();
ctx2.arc(n.x,n.y,30,0,Math.PI*2);

if(unlocked) ctx2.fillStyle="#0f0";
else if(available) ctx2.fillStyle="#ff0";
else ctx2.fillStyle="#444";

ctx2.fill();
ctx2.strokeStyle="#888";
ctx2.stroke();
ctx2.fillStyle="white";
ctx2.fillText(n.name,n.x-25,n.y+4);
});

c.onclick=function(e){
let rect=c.getBoundingClientRect();
let mx=e.clientX-rect.left;
let my=e.clientY-rect.top;
skillTree.nodes.forEach(n=>{
if(Math.hypot(mx-n.x,my-n.y)<30) attemptUnlock(n);
});
};
}

function canUnlock(node){
if(player.unlockedSkills.includes(node.id))return false;
if(player.level<node.requiresLevel)return false;
if(player.skillPoints<node.cost)return false;
if(node.requiresItem && !player.inventory.includes(node.requiresItem))return false;
for(let r of node.requires){
if(!player.unlockedSkills.includes(r))return false;
}
return true;
}

function attemptUnlock(node){
if(!canUnlock(node))return;
player.skillPoints-=node.cost;
player.unlockedSkills.push(node.id);

if(node.type=="physical"){
player.abilities.physical.push({
id:node.id,name:node.name,power:node.power
});
}else{
player.abilities.spells.push({
id:node.id,name:node.name,power:node.power,mp:node.mp
});
}
drawSkillTree();
}

/* ================= DRAW ================= */

function draw(){
ctx.clearRect(0,0,canvas.width,canvas.height);

for(let y=0;y<H;y++){
for(let x=0;x<W;x++){
ctx.fillStyle=map[y][x]==1?"#1a1a1a":"#111";
ctx.fillRect(x*TILE,y*TILE,TILE,TILE);
}
}

if(stairs){
ctx.fillStyle="#888";
ctx.fillRect(stairs.x*TILE+8,stairs.y*TILE+8,16,16);
}

ctx.fillStyle="red";
for(let e of enemies)
ctx.fillRect(e.x*TILE+8,e.y*TILE+8,16,16);

ctx.fillStyle="#0f9";
ctx.fillRect(player.x*TILE+8,player.y*TILE+8,16,16);

ctx.fillStyle="white";
ctx.fillText("Floor: "+floor+"/100",10,20);
}

/* ================= INPUT ================= */

document.addEventListener("keydown",e=>{
if(state=="explore"){
if(e.key=="ArrowUp")move(0,-1);
if(e.key=="ArrowDown")move(0,1);
if(e.key=="ArrowLeft")move(-1,0);
if(e.key=="ArrowRight")move(1,0);
}
});

/* ================= UTIL ================= */

function rand(a,b){return Math.floor(Math.random()*(b-a+1))+a;}

</script>
</body>
</html>
